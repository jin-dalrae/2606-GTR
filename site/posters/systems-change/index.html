  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"35d587b6-a360-44aa-8fcb-9b5b07476b41\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>\n    @font-face { font-family: system-ui; }\n    body { margin: 0; background: oklch(0.90 0.015 75); }\n    @page { size: 17in 11in; margin: 0; }\n    @media print {\n      html, body { width: 17in; height: 11in; margin: 0; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:2550px; height:1650px; background:oklch(0.97 0.012 75); position:relative; overflow:hidden; box-sizing:border-box;\">\n<div style=\"width:1920px; height:1080px; background:oklch(0.97 0.012 75); font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; display:flex; flex-direction:column; padding:72px 96px; box-sizing:border-box; position:absolute; top:107.6px; left:0; transform:scale(1.328125); transform-origin:top left; overflow:hidden;\">\n\n  <!-- Header -->\n  <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:56px;\">\n    <div style=\"display:flex; align-items:center; gap:14px;\">\n      <div style=\"width:10px; height:10px; border-radius:50%; background:oklch(0.52 0.10 155);\"><\u002Fdiv>\n      <div style=\"font-size:20px; letter-spacing:0.14em; text-transform:uppercase; color:oklch(0.52 0.10 155); font-weight:600;\">SYSTEMS-CHANGE<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:46px; font-weight:700; color:oklch(0.27 0.012 60); letter-spacing:-0.01em; line-height:1.15;\">\n      Embedding carbon accountability where founders already show up\n    <\u002Fdiv>\n    <div style=\"font-size:21px; color:oklch(0.42 0.014 60); font-weight:400; max-width:1150px; line-height:1.5;\">\n      Instead of asking individual startups to voluntarily measure impact, the assessment rides inside an accelerator's existing intake — so it reaches every founder, in every cohort, by default.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Pipeline -->\n  <div style=\"display:flex; align-items:stretch; gap:0; flex:1; min-height:0;\">\n\n    <!-- Stage 0 -->\n    <div style=\"display:flex; flex-direction:column; flex:1; min-width:0;\">\n      <div style=\"background:#ffffff; border-radius:20px; box-shadow:0 1px 2px oklch(0.3 0.01 60 / 0.06), 0 8px 24px oklch(0.3 0.01 60 / 0.07); padding:36px 30px; flex:1; display:flex; flex-direction:column; gap:18px; border:1.5px dashed oklch(0.7 0.03 155);\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"font-size:15px; font-weight:700; letter-spacing:0.08em; color:oklch(0.6 0.02 60);\">STAGE 01<\u002Fdiv>\n          <div style=\"width:52px; height:52px; border-radius:14px; background:oklch(0.94 0.03 155); display:flex; align-items:center; justify-content:center;\">\n            <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 28 28\" fill=\"none\">\n              <path d=\"M4 22 L11 8 L17 16 L21 10 L25 22\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <circle cx=\"11\" cy=\"8\" r=\"1.8\" fill=\"oklch(0.52 0.13 155)\"><\u002Fcircle>\n              <circle cx=\"21\" cy=\"10\" r=\"1.8\" fill=\"oklch(0.52 0.13 155)\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:25px; font-weight:700; color:oklch(0.27 0.012 60);\">Pitch to Program Directors<\u002Fdiv>\n        <div style=\"font-size:16.5px; line-height:1.55; color:oklch(0.42 0.014 60); flex:1;\">\n          We introduce the work to <strong style=\"color: oklch(0.3 0.014 60);\">program directors<\u002Fstrong> at climate accelerators, positioning it as a way to strengthen shared founder-investor understanding of climate impact.\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid oklch(0.92 0.01 60); padding-top:14px; font-size:14.5px; font-style:italic; color:oklch(0.52 0.10 155); font-weight:600;\">\n          Buy-in at the top, once.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Connector 0 -->\n    <div style=\"width:64px; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n      <svg width=\"48\" height=\"24\" sc-camel-view-box=\"0 0 48 24\" fill=\"none\">\n        <line x1=\"2\" y1=\"12\" x2=\"38\" y2=\"12\" stroke=\"oklch(0.6 0.02 60)\" stroke-width=\"2\"><\u002Fline>\n        <path d=\"M32 5 L40 12 L32 19\" stroke=\"oklch(0.6 0.02 60)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- Stage 1 -->\n    <div style=\"display:flex; flex-direction:column; flex:1; min-width:0;\">\n      <div style=\"background:#ffffff; border-radius:20px; box-shadow:0 1px 2px oklch(0.3 0.01 60 / 0.06), 0 8px 24px oklch(0.3 0.01 60 / 0.07); padding:36px 30px; flex:1; display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"font-size:15px; font-weight:700; letter-spacing:0.08em; color:oklch(0.6 0.02 60);\">STAGE 02<\u002Fdiv>\n          <div style=\"width:52px; height:52px; border-radius:14px; background:oklch(0.94 0.03 155); display:flex; align-items:center; justify-content:center;\">\n            <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 28 28\" fill=\"none\">\n              <rect x=\"5\" y=\"3\" width=\"18\" height=\"22\" rx=\"3\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\"><\u002Frect>\n              <line x1=\"9\" y1=\"10\" x2=\"19\" y2=\"10\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n              <line x1=\"9\" y1=\"15\" x2=\"19\" y2=\"15\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n              <circle cx=\"10.5\" cy=\"20.5\" r=\"2.3\" fill=\"oklch(0.52 0.13 155)\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 25px; font-weight: 700; color: oklch(0.27 0.012 60); width: 229px; height: 58px\">Founder Onboarding<\u002Fdiv>\n        <div style=\"font-size:16.5px; line-height:1.55; color:oklch(0.42 0.014 60); flex:1;\">\n          A climate-specific accelerator adds a <strong style=\"color:oklch(0.3 0.014 60);\">~2-minute carbon assessment<\u002Fstrong> as a standard step in its existing application &amp; onboarding — no new curriculum slot required.\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid oklch(0.92 0.01 60); padding-top:14px; font-size:14.5px; font-style:italic; color:oklch(0.52 0.10 155); font-weight:600;\">\n          One accelerator adopts the standard.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Connector 1 -->\n    <div style=\"width:64px; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n      <svg width=\"48\" height=\"24\" sc-camel-view-box=\"0 0 48 24\" fill=\"none\">\n        <line x1=\"2\" y1=\"12\" x2=\"38\" y2=\"12\" stroke=\"oklch(0.6 0.02 60)\" stroke-width=\"2\"><\u002Fline>\n        <path d=\"M32 5 L40 12 L32 19\" stroke=\"oklch(0.6 0.02 60)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- Stage 2 -->\n    <div style=\"display:flex; flex-direction:column; flex:1; min-width:0;\">\n      <div style=\"background:#ffffff; border-radius:20px; box-shadow:0 1px 2px oklch(0.3 0.01 60 / 0.06), 0 8px 24px oklch(0.3 0.01 60 / 0.07); padding:36px 30px; flex:1; display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"font-size:15px; font-weight:700; letter-spacing:0.08em; color:oklch(0.6 0.02 60);\">STAGE 03<\u002Fdiv>\n          <div style=\"width:52px; height:52px; border-radius:14px; background:oklch(0.94 0.03 155); display:flex; align-items:center; justify-content:center;\">\n            <svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 28 28\" fill=\"none\">\n              <circle cx=\"14\" cy=\"9\" r=\"5\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\"><\u002Fcircle>\n              <path d=\"M4 25 C4 18 9 15 14 15 C19 15 24 18 24 25\" stroke=\"oklch(0.42 0.11 155)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:25px; font-weight:700; color:oklch(0.27 0.012 60);\">Identifying current progress<\u002Fdiv>\n        <div style=\"font-size:16.5px; line-height:1.55; color:oklch(0.42 0.014 60); flex:1;\"><span data-metadata=\"&lt;!--(figmeta)eyJmaWxlS2V5IjoiQlk2UHNXcWFwVm5Qb0xwWG50anBtMSIsInBhc3RlSUQiOjcyMzEzMzk2OCwiZGF0YVR5cGUiOiJzY2VuZSIsImVudmlyb25tZW50Ijoid3d3LmZpZ21hLmNvbSIsInNlbGVjdGVkTm9kZURhdGEiOiIyMzoxMTN8MzF8MCJ9Cg==(/figmeta)--&gt;\"><\u002Fspan><span data-buffer=\"&lt;!--(figma)ZmlnLWtpd2lqAAAAEH8AALW9CZhkSXHYn+/V1T333gew3Pe17C6X7rq6u2aqq4p61T07a1mt6qrq6dqprirVq56dwRdCCCGEEEIII4QQRhghjDDCCCGEEEIIIYwQQhhjjPEaI4wxxhhjjDHG/19E5juquxdZn7//fjv9MiMjIyMjIyMjI/O9+kp2fRCG3YuDztXpwJhbzjZrja2gU2x3DP81mpXqVnmt2FitBmS9jaDaTuV9xa42KqQzQW21UayTygadC/UqiZwmtoKq0MorrlLeCs7VWlvtar1ZlJqFRrNTW7mwFaw1N+qVrY3WartYkfpLLrlVaTYkvxzl29WVdjVYA3QsKFcb1S3ArbWt52xU2xcAHk8D29VWXYAnKrWVFZ4ny/VatdHZKrVpvVwMhLdTKd7ONjfa9KMqnJ0OOu1qcd2WkD/j8rbH19QanWq7WO7UNulkvQZjVjSUXduulpuNRrVMZ1PMRBxed3RxxOv1yg+tbNUa5XZ1HX6LdUpdHTBu0JGBr85GkLR6o+tbm6rVtnbhptLGPfdsFVutdnMTGjHqzcUrw5ARvJu0kTa9Yq+HJgCii5WtZkM5MZo53651pJLXmPQHrd1uOAANxoodbQOk9eamJr3zw3F/OL7Y3h8JTqPZuKfablJgmhUtFwpW1YoUVgGZSrO8IV0k6ZWLjc1iQMpfbTc3WiQyK+3iuuBlS81mvVpsbDVbSL1TazYA5jaRR7NNKo8w5Fmo15TsUrVer7UCSS4juQ79VqU81q6ubtSL7a1Ws35hVYkcpykEVkFuCd6JTvVuYekkI1sWwKngwnqpKQp+utagsYZCUYla+ZyI6ppgrdiqbp2vdda2XN1r3YApg9eVZchK9Wb5HLnrz9cqqzoxboDWuvT0xvVqpVYkcdNabXWtzj8pvjmAgO3sLS65hbDb9aI0euv5
