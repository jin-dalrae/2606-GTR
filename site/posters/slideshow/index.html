<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster slideshow · Climatico</title>
  <meta name="description" content="Landscape tabloid posters in order — 20 seconds each." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #121816;
      --panel: #1a221e;
      --ink: #f2f4f2;
      --muted: rgba(242, 244, 242, 0.62);
      --accent: #7ddeb3;
      --accent-deep: #4cb88a;
      --line: rgba(255, 255, 255, 0.12);
      --serif: "Newsreader", Georgia, serif;
      --sans: "IBM Plex Sans", system-ui, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --bar-h: 56px;
      --slide-ms: 20000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      overflow: hidden;
    }

    .deck {
      height: 100%;
      display: grid;
      grid-template-rows: var(--bar-h) 1fr auto;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      z-index: 2;
    }

    .bar .brand {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .bar .brand strong {
      color: var(--ink);
      font-weight: 500;
    }

    .bar .meta {
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .bar .meta .title {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar .meta .count {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .controls button,
    .controls a {
      appearance: none;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
    }

    .controls button:hover,
    .controls a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls button.primary {
      background: var(--accent-deep);
      border-color: var(--accent-deep);
      color: #0a120e;
      font-weight: 600;
    }

    .controls button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .stage {
      position: relative;
      background: #0a0e0c;
      min-height: 0;
    }

    .stage iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #d8d4cb;
    }

    .progress {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .progress .fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: none;
    }

    .progress .fill.run {
      transition: width linear var(--slide-ms);
    }

    .hint {
      position: absolute;
      bottom: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(10, 14, 12, 0.72);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 3;
    }

    .hint.show { opacity: 1; }

    @media (max-width: 720px) {
      .bar .meta .title { font-size: 0.9rem; }
      .controls .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <div class="deck">
    <header class="bar">
      <div class="brand"><strong>Slideshow</strong> · Landscape posters</div>
      <div class="meta">
        <div class="title" id="slide-title">Loading…</div>
        <div class="count" id="slide-count">—</div>
      </div>
      <div class="controls">
        <button type="button" id="btn-prev" aria-label="Previous">Prev</button>
        <button type="button" id="btn-pause" class="primary" aria-label="Pause or play">Pause</button>
        <button type="button" id="btn-next" aria-label="Next">Next</button>
        <a class="hide-sm" href="../" id="btn-exit">Exit</a>
      </div>
    </header>

    <div class="stage">
      <iframe id="frame" title="Poster slide" src="about:blank"></iframe>
      <div class="hint" id="hint">Arrow keys · Space pause · Esc exit</div>
    </div>

    <div class="progress" aria-hidden="true">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <script>
    (function () {
      const DURATION = 20000;
      // Horizontal / landscape posters only, narrative order
      const SLIDES = [
        { href: "../ei-concept/", title: "How Environmental Impact is calculated and used?" },
        { href: "../actionable-insights/landscape/", title: "Actionable insights · Landscape" },
        { href: "../behavior-change/", title: "Climatico & GTR Partners · Behavior change" },
        { href: "../systems-change/", title: "Systems change" },
        { href: "../climatico-leaderboard/", title: "Climatico Leaderboard · 2028" },
        { href: "../culture-shift/", title: "Culture shift" },
        { href: "../paradigm-shift/", title: "Paradigm shift" },
      ];

      const frame = document.getElementById("frame");
      const titleEl = document.getElementById("slide-title");
      const countEl = document.getElementById("slide-count");
      const fill = document.getElementById("fill");
      const btnPrev = document.getElementById("btn-prev");
      const btnNext = document.getElementById("btn-next");
      const btnPause = document.getElementById("btn-pause");
      const hint = document.getElementById("hint");

      let index = 0;
      let paused = false;
      let timer = null;
      let startedAt = 0;
      let remaining = DURATION;

      function showHintBriefly() {
        hint.classList.add("show");
        setTimeout(function () { hint.classList.remove("show"); }, 2800);
      }

      function stopTimer() {
        if (timer) {
          clearTimeout(timer);
          timer = null;
        }
        fill.classList.remove("run");
      }

      function startProgress(ms) {
        // restart CSS width transition
        fill.classList.remove("run");
        fill.style.width = "0%";
        // force reflow
        void fill.offsetWidth;
        fill.style.width = "100%";
        fill.style.transitionDuration = ms + "ms";
        fill.classList.add("run");
      }

      function schedule(ms) {
        stopTimer();
        if (paused) return;
        remaining = ms;
        startedAt = Date.now();
        startProgress(ms);
        timer = setTimeout(function () {
          go(index + 1);
        }, ms);
      }

      function show(i) {
        if (i < 0) i = SLIDES.length - 1;
        if (i >= SLIDES.length) i = 0;
        index = i;
        const s = SLIDES[index];
        titleEl.textContent = s.title;
        countEl.textContent = (index + 1) + " / " + SLIDES.length + " · 20s each";
        frame.src = s.href;
        remaining = DURATION;
        if (!paused) schedule(DURATION);
        else {
          stopTimer();
          fill.style.width = "0%";
        }
      }

      function go(i) {
        show(i);
      }

      function togglePause() {
        if (paused) {
          paused = false;
          btnPause.textContent = "Pause";
          schedule(remaining > 200 ? remaining : DURATION);
        } else {
          paused = true;
          btnPause.textContent = "Play";
          if (startedAt) {
            const elapsed = Date.now() - startedAt;
            remaining = Math.max(0, remaining - elapsed);
          }
          stopTimer();
          // freeze fill where it is
          const pct = Math.min(100, ((DURATION - remaining) / DURATION) * 100);
          fill.style.transitionDuration = "0ms";
          fill.style.width = pct + "%";
        }
      }

      btnPrev.addEventListener("click", function () { go(index - 1); });
      btnNext.addEventListener("click", function () { go(index + 1); });
      btnPause.addEventListener("click", togglePause);

      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight" || e.key === "PageDown") {
          e.preventDefault();
          go(index + 1);
        } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
          e.preventDefault();
          go(index - 1);
        } else if (e.key === " " || e.key === "k") {
          e.preventDefault();
          togglePause();
        } else if (e.key === "Escape") {
          window.location.href = "../";
        } else if (e.key === "f") {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.();
          } else {
            document.exitFullscreen?.();
          }
        }
      });

      // Optional: start from ?i=
      const params = new URLSearchParams(window.location.search);
      const start = parseInt(params.get("i") || "0", 10);
      show(Number.isFinite(start) ? start : 0);
      showHintBriefly();
    })();
  </script>
</body>
</html>
