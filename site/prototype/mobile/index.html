<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#dedcd5" />
  <title>Climatico · Onboarding</title>
  <meta name="description" content="Climatico onboarding assessment — original mobile wireframe." />
  <style>
    /*
      True mobile host page:
      - no midterm site header / toolbar
      - loads the original onboarding build as-is (phone bezel, colors, type)
      - only the iframe document scrolls (inner overflow-y pages)
    */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      background: #dedcd5; /* match original onboarding canvas */
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: #dedcd5;
    }
  </style>
</head>
<body>
  <!-- Original Prototype 1 onboarding — same HTML/CSS as prototype1 (phone frame + styles) -->
  <iframe
    id="onboarding"
    title="Climatico onboarding assessment"
    src="../../prototype1/index.html"
    allow="clipboard-write"
    loading="eager"
  ></iframe>
</body>
</html>
