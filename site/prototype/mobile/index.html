<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#fbfaf7" />
  <title>Climatico · Onboarding</title>
  <meta name="description" content="Climatico onboarding assessment — full-screen mobile experience." />
  <style>
    /* True mobile shell: no site chrome, no outer scroll, one full-viewport app */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      background: #fbfaf7;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: #fbfaf7;
      /* scrolling happens inside the app, not on this page */
    }
  </style>
</head>
<body>
  <!-- Full-bleed onboarding app (no phone bezel, no midterm site header) -->
  <iframe
    id="onboarding"
    title="Climatico onboarding assessment"
    src="./app.html"
    allow="clipboard-write"
    loading="eager"
  ></iframe>
</body>
</html>
