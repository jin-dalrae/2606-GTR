"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"abf19c28-d015-4aa2-8780-90377f58e740\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box}\nbody{margin:0}\ninput,textarea,button{font-family:inherit}\n@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}\n@keyframes spin{to{transform:rotate(360deg)}}\n@keyframes barpulse{0%,100%{opacity:.35}50%{opacity:.8}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;width:100%;background:#dedcd5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 16px;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif\">\n  <div style=\"{{bezelStyle}}\">\n    <div style=\"position:relative;width:380px;height:760px;background:#fbfaf7;border:1px solid #e6e4dd;border-radius:32px;overflow:hidden;display:flex;flex-direction:column\">\n\n      <sc-if value=\"{{frameOn}}\" hint-placeholder-val=\"{{true}}\"><div style=\"position:absolute;top:9px;left:50%;transform:translateX(-50%);width:118px;height:6px;background:#1f1f1f;border-radius:4px;z-index:60\"><\u002Fdiv><\u002Fsc-if>\n\n      <div style=\"flex:none;padding:26px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #efeee9\">\n        <div style=\"flex:1;height:11px;border:1.5px solid #2b2b2b;border-radius:7px;background:#fff;overflow:hidden\">\n          <div style=\"{{progressStyle}}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font:600 13px ui-monospace,SFMono-Regular,monospace;color:#2b2b2b\">{{pageLabel}}<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;position:relative;overflow:hidden\">\n\n        <sc-if value=\"{{isP1}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"height:100%;overflow-y:auto;padding:22px 20px 26px;animation:panelIn .35s ease\">\n            <h1 style=\"font-size:21px;font-weight:700;color:#2b2b2b;line-height:1.25;margin:0 0 8px;letter-spacing:-.01em\">Tell us about your startup<\u002Fh1>\n            <p style=\"font-size:14px;line-height:1.5;color:#7a786f;margin:0 0 22px\">About two minutes. We turn it into an instant snapshot of your carbon footprint, your biggest hotspots, and where to act first.<\u002Fp>\n            <div style=\"font-size:12px;font-weight:700;color:#6b6a64;text-transform:uppercase;letter-spacing:.06em;margin:0 0 14px\">About your company<\u002Fdiv>\n\n            <div style=\"margin-bottom:18px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Company name<\u002Fspan>\n                <span style=\"font:700 9px/1 ui-monospace,monospace;letter-spacing:.07em;color:#fff;background:#2b2b2b;border-radius:4px;padding:3px 6px\">REQUIRED<\u002Fspan>\n              <\u002Fdiv>\n              <input value=\"{{companyName}}\" onchange=\"{{onCompanyName}}\" placeholder=\"e.g. Climatico\" style=\"width:100%;padding:13px 14px;font-size:15px;color:#2b2b2b;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;outline:none\" style-focus=\"border-color:#2b2b2b\">\n              <sc-if value=\"{{errCompany}}\" hint-placeholder-val=\"{{false}}\"><div style=\"margin-top:6px;font-size:12.5px;color:#b23b3b\">{{errCompany}}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:18px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Website URL<\u002Fspan>\n              <\u002Fdiv>\n              <input value=\"{{website}}\" onchange=\"{{onWebsite}}\" placeholder=\"https://\" style=\"width:100%;padding:13px 14px;font-size:15px;color:#2b2b2b;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;outline:none\" style-focus=\"border-color:#2b2b2b\">\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:18px\">\n              <div style=\"margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Business model<\u002Fspan>\n              <\u002Fdiv>\n              <button type=\"button\" onclick=\"{{bmDD.toggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 14px;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;cursor:pointer;text-align:left\" style-hover=\"border-color:#2b2b2b\">\n                <sc-if value=\"{{bmDD.hasValue}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:15px;color:#2b2b2b\">{{bmDD.value}}<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{bmDD.isPlaceholder}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-size:15px;color:#9a988f\">{{bmDD.placeholder}}<\u002Fspan><\u002Fsc-if>\n                <span style=\"font-size:11px;color:#6b6a64;flex:none\">▼<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{bmIsOther}}\" hint-placeholder-val=\"{{false}}\">\n                <input value=\"{{businessModelOther}}\" onchange=\"{{onBusinessModelOther}}\" placeholder=\"Describe your model…\" style=\"margin-top:10px;width:100%;padding:13px 14px;font-size:15px;color:#2b2b2b;background:#fff;border:1.5px solid #2b2b2b;border-radius:8px;outline:none\" style-focus=\"border-color:#000\">\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:12px\">\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:7px\">\n                  <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Funding stage<\u002Fspan>\n                  <span style=\"font:700 9px/1 ui-monospace,monospace;letter-spacing:.07em;color:#fff;background:#2b2b2b;border-radius:4px;padding:3px 6px\">REQUIRED<\u002Fspan>\n                <\u002Fdiv>\n                <button type=\"button\" onclick=\"{{fundingDD.toggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:13px 12px;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;cursor:pointer;text-align:left\" style-hover=\"border-color:#2b2b2b\">\n                  <sc-if value=\"{{fundingDD.hasValue}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:14px;color:#2b2b2b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{fundingDD.value}}<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{fundingDD.isPlaceholder}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-size:14px;color:#9a988f\">{{fundingDD.placeholder}}<\u002Fspan><\u002Fsc-if>\n                  <span style=\"font-size:11px;color:#6b6a64;flex:none\">▼<\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{errFunding}}\" hint-placeholder-val=\"{{false}}\"><div style=\"margin-top:6px;font-size:12.5px;color:#b23b3b\">{{errFunding}}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"margin-bottom:7px\">\n                  <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Team size (FTE)<\u002Fspan>\n                <\u002Fdiv>\n                <button type=\"button\" onclick=\"{{teamDD.toggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;padding:13px 12px;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;cursor:pointer;text-align:left\" style-hover=\"border-color:#2b2b2b\">\n                  <sc-if value=\"{{teamDD.hasValue}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:14px;color:#2b2b2b\">{{teamDD.value}}<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{teamDD.isPlaceholder}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-size:14px;color:#9a988f\">{{teamDD.placeholder}}<\u002Fspan><\u002Fsc-if>\n                  <span style=\"font-size:11px;color:#6b6a64;flex:none\">▼<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{isP2}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"height:100%;overflow-y:auto;padding:22px 20px 26px;animation:panelIn .35s ease\">\n            <h1 style=\"font-size:21px;font-weight:700;color:#2b2b2b;line-height:1.25;margin:0 0 8px;letter-spacing:-.01em\">Tell us a bit more<\u002Fh1>\n            <p style=\"font-size:14px;line-height:1.5;color:#7a786f;margin:0 0 22px\">No documents needed. Pick a range or skip anything you'd rather keep private — it sharpens your estimate, that's all.<\u002Fp>\n\n            <div style=\"margin-bottom:20px\">\n              <div style=\"margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">In one line, what do you build?<\u002Fspan>\n              <\u002Fdiv>\n              <textarea value=\"{{build}}\" onchange=\"{{onBuild}}\" rows=\"3\" placeholder=\"e.g. AI tools that help grid operators cut energy waste\" style=\"width:100%;padding:12px 14px;font-size:15px;color:#2b2b2b;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;outline:none;resize:none;line-height:1.45\" style-focus=\"border-color:#2b2b2b\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:20px\">\n              <div style=\"margin-bottom:3px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Where does most of your spend go?<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9a988f;margin:0 0 11px\">Pick any that apply — categories only, no amounts.<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <sc-for list=\"{{spendChips}}\" as=\"chip\" hint-placeholder-count=\"6\">\n                  <button type=\"button\" onclick=\"{{chip.toggle}}\" style=\"{{chip.style}}\">{{chip.label}}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:18px\">\n              <div style=\"margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Monthly cloud &amp; software spend<\u002Fspan>\n              <\u002Fdiv>\n              <button type=\"button\" onclick=\"{{cloudDD.toggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 14px;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;cursor:pointer;text-align:left\" style-hover=\"border-color:#2b2b2b\">\n                <sc-if value=\"{{cloudDD.hasValue}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:15px;color:#2b2b2b\">{{cloudDD.value}}<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{cloudDD.isPlaceholder}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-size:15px;color:#9a988f\">{{cloudDD.placeholder}}<\u002Fspan><\u002Fsc-if>\n                <span style=\"font-size:11px;color:#6b6a64;flex:none\">▼<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:4px\">\n              <div style=\"margin-bottom:7px\">\n                <span style=\"font-size:14px;font-weight:600;color:#2b2b2b\">Annual revenue<\u002Fspan>\n              <\u002Fdiv>\n              <button type=\"button\" onclick=\"{{revDD.toggle}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 14px;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;cursor:pointer;text-align:left\" style-hover=\"border-color:#2b2b2b\">\n                <sc-if value=\"{{revDD.hasValue}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:15px;color:#2b2b2b\">{{revDD.value}}<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{revDD.isPlaceholder}}\" hint-placeholder-val=\"{{true}}\"><span style=\"font-size:15px;color:#9a988f\">{{revDD.placeholder}}<\u002Fspan><\u002Fsc-if>\n                <span style=\"font-size:11px;color:#6b6a64;flex:none\">▼<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:20px;padding:13px 14px;background:#f4f3ee;border:1px solid #e6e4dd;border-radius:10px\">\n              <span style=\"font-size:12.5px;line-height:1.5;color:#6b6a64\">Ranges only — we never ask for exact figures or documents, and nothing you enter leaves your browser. Skip anything you'd rather not share.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{isP3}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"height:100%;overflow-y:auto;padding:22px 20px 26px;animation:panelIn .35s ease\">\n            <h1 style=\"font-size:21px;font-weight:700;color:#2b2b2b;line-height:1.25;margin:0 0 8px;letter-spacing:-.01em\">Confirm what your company does<\u002Fh1>\n            <p style=\"font-size:14px;line-height:1.5;color:#7a786f;margin:0 0 20px\">We've ticked the activities most startups like yours have. Add the ones that apply and uncheck the rest — this decides which emissions we estimate.<\u002Fp>\n\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin:0 0 2px\">\n              <span style=\"font-size:12px;font-weight:700;color:#2b2b2b;text-transform:uppercase;letter-spacing:.06em\">Emits<\u002Fspan>\n              <span style=\"font-size:12px;color:#9a988f\">(–) adds to footprint<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:24px\">\n              <sc-for list=\"{{emitsList}}\" as=\"it\" hint-placeholder-count=\"5\">\n                <button type=\"button\" onclick=\"{{it.toggle}}\" style=\"width:100%;display:flex;align-items:center;gap:13px;padding:13px 4px;background:none;border:none;border-bottom:1px solid #f0efea;cursor:pointer;text-align:left\">\n                  <span style=\"{{it.boxStyle}}\"><sc-if value=\"{{it.checked}}\" hint-placeholder-val=\"{{true}}\"><span style=\"color:#fff;font-size:13px;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                  <span style=\"font-size:15px;color:#2b2b2b\">{{it.label}}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin:0 0 2px\">\n              <span style=\"font-size:12px;font-weight:700;color:#2b2b2b;text-transform:uppercase;letter-spacing:.06em\">Avoids<\u002Fspan>\n              <span style=\"font-size:12px;color:#9a988f\">(+) reduces footprint<\u002Fspan>\n            <\u002Fdiv>\n            <div>\n              <sc-for list=\"{{avoidsList}}\" as=\"it\" hint-placeholder-count=\"3\">\n                <button type=\"button\" onclick=\"{{it.toggle}}\" style=\"width:100%;display:flex;align-items:center;gap:13px;padding:13px 4px;background:none;border:none;border-bottom:1px solid #f0efea;cursor:pointer;text-align:left\">\n                  <span style=\"{{it.boxStyle}}\"><sc-if value=\"{{it.checked}}\" hint-placeholder-val=\"{{true}}\"><span style=\"color:#fff;font-size:13px;line-height:1\">✓<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                  <span style=\"font-size:15px;color:#2b2b2b\">{{it.label}}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{isP4}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"height:100%;overflow-y:auto;padding:22px 20px 26px;animation:panelIn .35s ease\">\n            <h1 style=\"font-size:21px;font-weight:700;color:#2b2b2b;line-height:1.25;margin:0 0 8px;letter-spacing:-.01em\">In your own words, what does your company do?<\u002Fh1>\n            <p style=\"font-size:14px;line-height:1.5;color:#7a786f;margin:0 0 18px\">Optional, but it helps a lot — especially anything you do to cut or avoid emissions.<\u002Fp>\n            <textarea value=\"{{notes}}\" onchange=\"{{onNotes}}\" rows=\"6\" placeholder=\"e.g. We replace diesel delivery vans with e-cargo delivery bikes.\" style=\"width:100%;padding:13px 14px;font-size:15px;color:#2b2b2b;background:#fff;border:1.5px solid #cfcdc7;border-radius:8px;outline:none;resize:none;line-height:1.5\" style-focus=\"border-color:#2b2b2b\"><\u002Ftextarea>\n            <div style=\"font-size:12.5px;color:#9a988f;margin-top:12px;line-height:1.5\">This is the last step. Tap \"Generate my assessment\" below when you're ready.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{isP5}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"height:100%;overflow-y:auto;padding:18px 16px 24px;animation:panelIn .35s ease\">\n\n            <div style=\"margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #efeee9\">\n              <div style=\"font-size:18px;font-weight:700;color:#2b2b2b\">{{report.companyDisplay}}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9a988f;margin-top:5px;line-height:1.4\">{{report.tagline}}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px\">\n              <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;background:#fff\">\n                <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9a988f;margin-bottom:8px\">Est. footprint<\u002Fdiv>\n                <div style=\"font-size:28px;font-weight:700;color:#2b2b2b;line-height:1\">{{report.footprint}}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9a988f;margin-top:6px\">tCO₂e / yr<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;background:#fff\">\n                <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9a988f;margin-bottom:8px;line-height:1.3\">Positive impact<\u002Fdiv>\n                <div style=\"font-size:28px;font-weight:700;color:#2b2b2b;line-height:1\">{{report.handprintDisplay}}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9a988f;margin-top:6px\">tCO₂e avoidable<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;margin-bottom:10px;background:#fff;display:flex;align-items:center;gap:14px\">\n              {{report.gaugeEl}}\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9a988f;margin-bottom:5px\">Impact maturity<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:700;color:#2b2b2b\">Level 1 · Mapped<\u002Fdiv>\n                <div style=\"font-size:12px;color:#6b6a64;margin-top:4px;line-height:1.4\">Next step: measure your footprint<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;margin-bottom:10px;background:#fff\">\n              <div style=\"font-size:13px;font-weight:700;color:#2b2b2b;margin-bottom:14px\">Top hotspots — act here first<\u002Fdiv>\n              <sc-for list=\"{{report.top3}}\" as=\"hs\" hint-placeholder-count=\"3\">\n                <div style=\"margin-bottom:16px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px\">\n                    <span style=\"font-size:13px;font-weight:600;color:#2b2b2b\">{{hs.label}}<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:700;color:#2b2b2b;white-space:nowrap;margin-left:8px\">{{hs.val}} tCO₂e<\u002Fspan>\n                  <\u002Fdiv>\n                  {{hs.bar}}\n                  <div style=\"font-size:12px;color:#6b6a64;line-height:1.45;margin-top:5px\">→ {{hs.action}}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;margin-bottom:10px;background:#fff\">\n              <div style=\"font-size:13px;font-weight:700;color:#2b2b2b;margin-bottom:4px\">Carbon cost exposure<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9a988f;margin-bottom:10px;line-height:1.4\">If carbon is priced via fees or procurement clauses<\u002Fdiv>\n              <div style=\"font-size:26px;font-weight:700;color:#2b2b2b\">${{report.costLow}}–${{report.costHigh}}/yr<\u002Fdiv>\n              <div style=\"font-size:12px;color:#6b6a64;margin-top:7px\">→ Budget for this before your next fundraise<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"border:1.5px solid #e6e4dd;border-radius:12px;padding:14px;margin-bottom:14px;background:#fff\">\n              <div style=\"font-size:13px;font-weight:700;color:#2b2b2b;margin-bottom:10px\">Impact beyond carbon<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px\">\n                <div style=\"border:1px solid #efeee9;border-radius:10px;padding:12px 8px;text-align:center\">\n                  <div style=\"font-size:20px;margin-bottom:6px\">⚡<\u002Fdiv>\n                  <div style=\"font-size:14px;font-weight:700;color:#2b2b2b\">{{report.energyKwh}}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9a988f\">kWh/yr<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#6b6a64;margin-top:3px\">Energy<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border:1px solid #efeee9;border-radius:10px;padding:12px 8px;text-align:center\">\n                  <div style=\"font-size:20px;margin-bottom:6px\">〜<\u002Fdiv>\n                  <div style=\"font-size:14px;font-weight:700;color:#2b2b2b\">{{report.waterM3}}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9a988f\">m³/yr<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#6b6a64;margin-top:3px\">Water<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"border:1px solid #efeee9;border-radius:10px;padding:12px 8px;text-align:center\">\n                  <div style=\"font-size:20px;margin-bottom:6px\">♻<\u002Fdiv>\n                  <div style=\"font-size:14px;font-weight:700;color:#2b2b2b\">{{report.wasteKg}}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9a988f\">kg/yr<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#6b6a64;margin-top:3px\">Waste<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <button type=\"button\" onclick=\"{{report.onShareLinkedIn}}\" style=\"width:100%;padding:14px;font-size:14px;font-weight:600;color:#2b2b2b;background:#fff;border:1.5px solid #2b2b2b;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px\" style-hover=\"background:#f3f2ec\"><span style=\"font-size:11px;font-weight:700;background:#2b2b2b;color:#fff;padding:2px 5px;border-radius:2px;flex:none\">in<\u002Fspan>Share on LinkedIn<\u002Fbutton>\n              <button type=\"button\" onclick=\"{{report.onCopyLink}}\" style=\"width:100%;padding:14px;font-size:14px;font-weight:600;color:#2b2b2b;background:#fff;border:1.5px solid #cfcdc7;border-radius:10px;cursor:pointer\" style-hover=\"background:#f3f2ec\">Copy link<\u002Fbutton>\n              <button type=\"button\" style=\"width:100%;padding:14px;font-size:14px;font-weight:600;color:#fff;background:#2b2b2b;border:1.5px solid #2b2b2b;border-radius:10px;cursor:pointer\" style-hover=\"background:#000\">Create account for full report →<\u002Fbutton>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{generating}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"position:absolute;inset:0;z-index:55;background:rgba(251,250,247,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px\">\n            <div style=\"width:46px;height:46px;border:4px solid #e0ded6;border-top-color:#2b2b2b;border-radius:50%;animation:spin .9s linear infinite\"><\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;color:#2b2b2b\">Generating your snapshot…<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#9a988f\">Reading your profile &amp; selected activities<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <sc-if value=\"{{showFooter}}\" hint-placeholder-val=\"{{true}}\"><div style=\"flex:none;padding:14px 18px 16px;border-top:1px solid #efeee9;display:flex;align-items:center;gap:10px;background:#fbfaf7\">\n        <sc-if value=\"{{showBack}}\" hint-placeholder-val=\"{{false}}\">\n          <button type=\"button\" onclick=\"{{goBack}}\" style=\"padding:12px 16px;font-size:14px;font-weight:600;color:#2b2b2b;background:#fff;border:1.5px solid #2b2b2b;border-radius:8px;cursor:pointer\" style-hover=\"background:#f3f2ec\">← {{backLabel}}<\u002Fbutton>\n        <\u002Fsc-if>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <sc-if value=\"{{showNextBtn}}\" hint-placeholder-val=\"{{true}}\">\n          <button type=\"button\" onclick=\"{{goNext}}\" style=\"padding:12px 22px;font-size:14px;font-weight:600;color:#fff;background:#2b2b2b;border:1.5px solid #2b2b2b;border-radius:8px;cursor:pointer\" style-hover=\"background:#000\">Next →<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{showGenerate}}\" hint-placeholder-val=\"{{false}}\">\n          <button type=\"button\" onclick=\"{{generate}}\" style=\"padding:12px 18px;font-size:14px;font-weight:600;color:#fff;background:#2b2b2b;border:1.5px solid #2b2b2b;border-radius:8px;cursor:pointer\" style-hover=\"background:#000\">Generate my assessment →<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{showRestart}}\" hint-placeholder-val=\"{{false}}\">\n          <button type=\"button\" onclick=\"{{restart}}\" style=\"padding:12px 18px;font-size:14px;font-weight:600;color:#2b2b2b;background:#fff;border:1.5px solid #2b2b2b;border-radius:8px;cursor:pointer\" style-hover=\"background:#f3f2ec\">Start over<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv><\u002Fsc-if>\n\n      <sc-if value=\"{{sheetOpen}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;justify-content:flex-end\">\n          <div onclick=\"{{closeSheet}}\" style=\"position:absolute;inset:0;background:rgba(31,31,31,.4)\"><\u002Fdiv>\n          <div style=\"position:relative;background:#fbfaf7;border-radius:20px 20px 0 0;max-height:78%;overflow-y:auto;padding:0 0 14px;box-shadow:0 -8px 30px rgba(0,0,0,.22);animation:sheetUp .28s cubic-bezier(.4,0,.2,1)\">\n            <div style=\"width:38px;height:4px;background:#d6d4cc;border-radius:3px;margin:10px auto 4px\"><\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:700;color:#9a988f;padding:8px 20px 8px;text-transform:uppercase;letter-spacing:.05em\">{{activeSheet.title}}<\u002Fdiv>\n            <sc-for list=\"{{activeSheet.options}}\" as=\"opt\" hint-placeholder-count=\"5\">\n              <button type=\"button\" onclick=\"{{opt.onClick}}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:none;border:none;border-top:1px solid #f0efea;font-size:16px;color:#2b2b2b;text-align:left;cursor:pointer\" style-hover=\"background:#f3f2ec\">\n                <span>{{opt.label}}<\u002Fspan>\n                <sc-if value=\"{{opt.selected}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:15px;color:#2b2b2b\">●<\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"font-size:12px;color:#8a8983;font-family:ui-monospace,monospace\">Onboarding assessment · mobile wireframe<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:910},&quot;startPage&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:5,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Prototype&quot;,&quot;unit&quot;:&quot;page&quot;},&quot;prefillExample&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;showDeviceFrame&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Prototype&quot;}}\">\nclass Component extends DCLogic {\\n  constructor(props){\\n    super(props);\\n    window.app = this;\n    this.BM = ['SaaS / Software','Hardware','Marketplace','Consumer app','Services / Consulting','Manufacturing','Other'];\n    this.FUND = ['Pre-seed','Seed','Series A','Series B','Series C or later','Bootstrapped','Grant-funded','Other'];\n    this.TEAM = ['Just me','2–5','6–10','11–25','26–50','51–100','100+'];\n    this.CLOUD = ['Under $1k / mo','$1k–5k / mo','$5k–20k / mo','$20k–50k / mo','Over $50k / mo','Prefer not to say'];\n    this.REV = ['Pre-revenue','Under $100k','$100k–1M','$1M–5M','Over $5M','Prefer not to say'];\n    this.SPEND = ['Cloud & compute','Salaries','Hardware','Office & travel','Manufacturing','Marketing','Logistics'];\n    this.EMITS = ['Cloud & AI compute','Hardware & Electronics','FTE Travel & Commutes','Key vendors & SaaS','Logistics & Distribution'];\n    this.AVOIDS = ['Grid decarbonization','Transport Avoidance','Low-Carbon Materials'];\n    this.KEY = 'onb_assess_v2';\n    this.DD = {\n      businessModel:{title:'Business model', opts:this.BM},\n      fundingStage:{title:'Funding stage', opts:this.FUND},\n      teamSize:{title:'Team size (FTE)', opts:this.TEAM},\n      cloudSpend:{title:'Monthly cloud & software spend', opts:this.CLOUD},\n      revenue:{title:'Annual revenue', opts:this.REV}\n    };\n    this.state = { page:1, generating:false, openDropdown:null, errors:{}, form:this.blank() };\n  }\n  blank(){\n    return { companyName:'', website:'', businessModel:'', businessModelOther:'', fundingStage:'', teamSize:'',\n      build:'', spendAreas:[], cloudSpend:'', revenue:'',\n      activities:{ 'Cloud & AI compute':true,'Hardware & Electronics':false,'FTE Travel & Commutes':true,'Key vendors & SaaS':false,'Logistics & Distribution':false,'Grid decarbonization':true,'Transport Avoidance':false,'Low-Carbon Materials':false },\n      notes:'' };\n  }\n  example(){\n    return { companyName:'Climatico', website:'https://climatico.io', businessModel:'Hardware', fundingStage:'Seed', teamSize:'11–25',\n      businessModelOther:'', build:'We build e-cargo delivery bikes that replace diesel vans for last-mile logistics.',\n      spendAreas:['Cloud & compute','Hardware','Logistics'], cloudSpend:'$1k–5k / mo', revenue:'Under $100k',\n      activities:{ 'Cloud & AI compute':true,'Hardware & Electronics':true,'FTE Travel & Commutes':true,'Key vendors & SaaS':false,'Logistics & Distribution':true,'Grid decarbonization':true,'Transport Avoidance':true,'Low-Carbon Materials':false },\n      notes:'Replace diesel delivery vans with e-cargo delivery bikes.' };\n  }\n  componentDidMount(){\\n    let applied = false;\\n    try { const s = localStorage.getItem(this.KEY); if(s){ const d = JSON.parse(s); this.setState({ form:{...this.blank(), ...d.form}, page:d.page||1 }); applied = true; } } catch(e){}\\n    if(!applied){\\n      const p = Math.min(5, Math.max(1, this.props.startPage||1));\\n      this.setState({ page:p, form: this.props.prefillExample ? this.example() : this.blank() });\\n    }\\n    setTimeout(() => {\\n      const select = document.getElementById('showcase-page-select');\\n      if (select) select.value = this.state.page;\\n    }, 50);\\n  }\n  componentDidUpdate(prev){\n    if(prev.startPage !== this.props.startPage){ const p = Math.min(5, Math.max(1, this.props.startPage||1)); this.setState({ page:p, openDropdown:null }); }\n    if(!prev.prefillExample && this.props.prefillExample){ this.setState({ form:this.example() }, this.persist); }\n  }\n  persist = () => { try { localStorage.setItem(this.KEY, JSON.stringify({ form:this.state.form, page:this.state.page })); } catch(e){} const select = document.getElementById('showcase-page-select'); if (select) select.value = this.state.page; };\n  setField(k,v){ this.setState(s => ({ form:{...s.form,[k]:v}, errors:{...s.errors,[k]:undefined} }), this.persist); }\n  openSheet = (id) => (e) => { if(e && e.stopPropagation) e.stopPropagation(); this.setState({ openDropdown:id }); };\n  closeSheet = (e) => { if(e && e.stopPropagation) e.stopPropagation(); this.setState({ openDropdown:null }); };\n  goNext = () => {\n    if(this.state.page === 1){\n      const errs = {};\n      if(!this.state.form.companyName.trim()) errs.companyName = 'Please add your company name to continue.';\n      if(!this.state.form.fundingStage) errs.fundingStage = 'Please choose a funding stage.';\n      if(Object.keys(errs).length){ this.setState({ errors:errs }); return; }\n    }\n    this.setState(s => ({ page:Math.min(5, s.page+1), openDropdown:null }), this.persist);\n  };\n  goBack = () => { this.setState(s => ({ page:Math.max(1, s.page-1), openDropdown:null }), this.persist); };\n  generate = () => { this.setState({ generating:true, openDropdown:null }); setTimeout(() => { this.setState({ generating:false, page:5 }, this.persist); }, 1500); };\n  restart = () => { this.setState({ page:1, openDropdown:null }, this.persist); };\n  renderVals(){\n    const f = this.state.form;\n    const dd = (id, ph) => ({ value:f[id], placeholder:ph, hasValue:!!f[id], isPlaceholder:!f[id], toggle:this.openSheet(id) });\n    const CHIP_DEF = { padding:'9px 13px', fontSize:'13.5px', borderRadius:'18px', cursor:'pointer', border:'1.5px solid #cfcdc7', background:'#fff', color:'#2b2b2b' };\n    const CHIP_SEL = { padding:'9px 13px', fontSize:'13.5px', borderRadius:'18px', cursor:'pointer', border:'1.5px solid #2b2b2b', background:'#2b2b2b', color:'#fff' };\n    const BOX_OFF = { flex:'none', width:'22px', height:'22px', border:'1.5px solid #2b2b2b', borderRadius:'5px', background:'#fff', display:'flex', alignItems:'center', justifyContent:'center' };\n    const BOX_ON = { flex:'none', width:'22px', height:'22px', border:'1.5px solid #2b2b2b', borderRadius:'5px', background:'#2b2b2b', display:'flex', alignItems:'center', justifyContent:'center' };\n    const spendChips = this.SPEND.map(a => {\n      const sel = f.spendAreas.indexOf(a) >= 0;\n      return { label:a, style: sel ? CHIP_SEL : CHIP_DEF, toggle: () => this.setState(s => {\n        const has = s.form.spendAreas.indexOf(a) >= 0;\n        const arr = has ? s.form.spendAreas.filter(x => x !== a) : [...s.form.spendAreas, a];\n        return { form:{...s.form, spendAreas:arr} };\n      }, this.persist) };\n    });\n    const mkAct = (label) => {\n      const ck = !!f.activities[label];\n      return { label, checked:ck, boxStyle: ck ? BOX_ON : BOX_OFF, toggle: () => this.setState(s => ({ form:{...s.form, activities:{...s.form.activities, [label]:!s.form.activities[label]}} }), this.persist) };\n    };\n    const page = this.state.page;\n    const pct = page <= 4 ? (page / 4 * 100) : 100;\n    const od = this.state.openDropdown;\n    let activeSheet = { title:'', options:[] };\n    if(od){\n      const meta = this.DD[od];\n      const cur = f[od];\n      activeSheet = { title:meta.title, options:meta.opts.map(o => ({ label:o, selected:o === cur, onClick:(e) => { if(e && e.stopPropagation) e.stopPropagation(); this.setField(od, o); this.setState({ openDropdown:null }); } })) };\n    }\n    const frame = this.props.showDeviceFrame !== false;\n    // --- Report computation ---\n    const EMIT_VALS = {'Cloud & AI compute':2.5,'Hardware & Electronics':1.2,'FTE Travel & Commutes':2.0,'Key vendors & SaaS':0.8,'Logistics & Distribution':3.6};\n    const AVOID_VALS = {'Grid decarbonization':8.0,'Transport Avoidance':7.0,'Low-Carbon Materials':5.0};\n    const TEAM_FTE = {'Just me':1,'2–5':3,'6–10':8,'11–25':18,'26–50':38,'51–100':75,'100+':150};\n    const HOT_ACTIONS = {\n      'Cloud & AI compute':'Switch to a low-carbon cloud region and track AI compute spend.',\n      'Hardware & Electronics':'Set end-of-life take-back targets and map your supply chain.',\n      'FTE Travel & Commutes':'Introduce a travel policy — flights are your biggest single lever.',\n      'Key vendors & SaaS':'Ask your top 5 vendors for carbon disclosure or science-based targets.',\n      'Logistics & Distribution':'Require emissions data from your logistics providers.',\n      'Purchased electricity':'Switch to a renewable energy tariff or sign a PPA.'\n    };\n    const fte = TEAM_FTE[f.teamSize] || 3;\n    const mult = fte / 3;\n    let emitHotspots = this.EMITS.filter(e => f.activities[e]).map(e => ({label:e, val:EMIT_VALS[e]*mult}));\n    emitHotspots.push({label:'Purchased electricity', val:1.7*mult});\n    emitHotspots.sort((a,b) => b.val - a.val);\n    const top3 = emitHotspots.slice(0,3);\n    const totalFP = emitHotspots.reduce((s,e) => s+e.val, 0);\n    const tf = Math.round(totalFP*10)/10;\n    const checkedAvoids = this.AVOIDS.filter(a => f.activities[a]);\n    const hp = Math.round(checkedAvoids.reduce((s,a) => s+(AVOID_VALS[a]||0), 0)*10)/10;\n    const CIRC = 2*Math.PI*35;\n    const costLow = Math.round(tf*75);\n    const costHigh = Math.round(tf*190);\n    const fullArc = Math.PI*40;\n    const fillArc = (0.2*fullArc).toFixed(1);\n    const gAngle = Math.PI*0.8; // level 1 = 20% from left = 144deg\n    const gnx = (50+32*Math.cos(gAngle)).toFixed(1);\n    const gny = (58-32*Math.sin(gAngle)).toFixed(1);\n    const gaugeEl = React.createElement('svg',{viewBox:'0 0 100 65',style:{width:'108px',height:'70px',flex:'none'}},\n      React.createElement('path',{key:'bg',d:'M10,58 A40,40 0 0,0 90,58',fill:'none',stroke:'#e6e4dd',strokeWidth:10,strokeLinecap:'round'}),\n      React.createElement('path',{key:'fill',d:'M10,58 A40,40 0 0,0 90,58',fill:'none',stroke:'#2b2b2b',strokeWidth:10,strokeLinecap:'round',strokeDasharray:`${fillArc} ${(fullArc*2).toFixed(1)}`}),\n      React.createElement('line',{key:'needle',x1:50,y1:58,x2:gnx,y2:gny,stroke:'#2b2b2b',strokeWidth:2.5,strokeLinecap:'round'}),\n      React.createElement('circle',{key:'dot',cx:50,cy:58,r:3,fill:'#2b2b2b'})\n    );\n    const top3Items = top3.map((h,i) => {\n      const pct = Math.round(h.val/totalFP*100);\n      const barEl = React.createElement('div',{key:'bar'+i,style:{height:'10px',borderRadius:'5px',background:'#f0efea',overflow:'hidden',margin:'5px 0'}},\n        React.createElement('div',{style:{height:'100%',width:pct+'%',background:'#2b2b2b',borderRadius:'5px'}})\n      );\n      return {label:h.label, val:h.val.toFixed(1), bar:barEl, action:HOT_ACTIONS[h.label]||'Review emissions in this category.'};\n    });\n    const shareUrl = 'https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(typeof window!=='undefined'?window.location.href:'https://app.climatico.io');\n    const report = {\n      companyDisplay: f.companyName.trim()||'Your company',\n      tagline: [f.fundingStage, f.businessModel, fte+' FTE · modelled estimate'].filter(Boolean).join(' · '),\n      peerContext: 'Within typical peer range for '+fte+'-FTE startups',\n      footprint: tf.toFixed(1),\n      handprintDisplay: hp>0 ? '~'+hp.toFixed(1) : '—',\n      costLow: costLow.toLocaleString(),\n      costHigh: costHigh.toLocaleString
