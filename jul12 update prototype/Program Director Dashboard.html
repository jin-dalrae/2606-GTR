document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n\n<script src=\"e7d95ecf-6b84-41d4-9edf-e13cef7b8891\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  body { margin: 0; }\n  * { box-sizing: border-box; }\n  a { color: #2b2b2b; }\n  a:hover { color: #111111; }\n  ::placeholder { color: #a8a599; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#dedcd5;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#2b2b2b\">\n  <div style=\"max-width:1320px;margin:0 auto;padding:36px 40px 100px\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:30px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <div style=\"width:12px;height:12px;background:#2b2b2b;transform:rotate(45deg);border-radius:2px\"><\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,monospace\">Greenhouse Climate Accelerator<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:4px;padding:3px;background:#eeece5;border-radius:9px\">\n        <sc-for list=\"{{navItems}}\" as=\"item\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{item.onClick}}\" style=\"cursor:pointer;font-size:13px;font-weight:600;padding:9px 17px;border-radius:6px;background:{{item.bg}};color:{{item.fg}};white-space:nowrap\">{{item.label}}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{isOverview}}\" hint-placeholder-val=\"{{true}}\">\n      <div data-screen-label=\"Screen 1 — Cohort overview\">\n\n        <div style=\"margin-bottom:24px\">\n          <h1 style=\"margin:0;font-size:30px;font-weight:700;letter-spacing:-0.01em\">Summer 2026 cohort<\u002Fh1>\n          <p style=\"margin:8px 0 0;font-size:14px;color:#77756b\">Cohort 7 · {{cohortSize}} founders · updated Jul 2026 · onboarding assessment engagement at a glance<\u002Fp>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{celebrate}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"{{celebrateStyle}}\">This cohort is pacing ahead on every measure — completion, confidence, and emissions intensity all improved over last year.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:grid;grid-template-columns:1.55fr 1fr 1fr;gap:18px\">\n\n          <div style=\"background:#fbfaf7;border:1px solid #e6e4dd;border-radius:14px;padding:24px;display:flex;align-items:center;gap:22px\">\n            <div style=\"position:relative;width:118px;height:118px;flex:none\">\n              {{completionRingEl}}\n              <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n                <div style=\"font-size:27px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1\">{{completionPct}}%<\u002Fdiv>\n                <div style=\"font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:#9a988f;margin-top:2px\">complete<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#807e73\">Onboarding completion<\u002Fdiv>\n              <div style=\"font-size:31px;font-weight:700;margin-top:7px;line-height:1.02;font-variant-numeric:tabular-nums\">{{completedN}} <span style=\"color:#a5a397;font-weight:600;font-size:24px\">of {{cohortSize}}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#77756b;margin-top:5px\">founders finished the climate assessment<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:11px;margin-top:15px;flex-wrap:wrap\">\n                <div style=\"{{deltaChipStyle}}\">↑ {{completionDeltaPts}} pts vs {{baselineName}}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#6b6a64\">{{completionHint}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fbfaf7;border:1px solid #e6e4dd;border-radius:14px;padding:22px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#807e73\">Climate confidence<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#9a988f;margin:5px 0 15px\">across {{completedN}} assessed founders<\u002Fdiv>\n            <div style=\"display:flex;height:12px;border-radius:999px;overflow:hidden;background:#eae8e1\">\n              <div style=\"width:{{mixStrongW}};background:#5a6a3e\"><\u002Fdiv>\n              <div style=\"width:{{mixModW}};background:#9a7415\"><\u002Fdiv>\n              <div style=\"width:{{mixEmergW}};background:#a5432e\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:9px;height:9px;border-radius:999px;background:#5a6a3e\"><\u002Fspan><span style=\"font-size:13.5px;font-weight:600\">Strong<\u002Fspan><\u002Fdiv>\n                <span style=\"font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,monospace\">{{mixStrong}}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:9px;height:9px;border-radius:999px;background:#9a7415\"><\u002Fspan><span style=\"font-size:13.5px;font-weight:60 e === 'expressive';\n    const celebrateStyle = { background:accentSoft, border:'1px solid ' + accent, color:'#2b2b2b', borderRadius:'12px', padding:'13px 18px', marginBottom:'20px', fontSize:'13.5px', fontWeight:'600', lineHeight:'1.45' };\n\n    // confidence mix widths (current)\n    const mixStrongW = Math.round(cur.strong / cur.completed * 100) + '%';\n    const mixModW = Math.round(cur.moderate / cur.completed * 100) + '%';\n    const mixEmergW = Math.round(cur.emerging / cur.completed * 100) + '%';\n\n    // nav + filters\n    const navItems = [\n      { key:'overview', label:'Cohort overview' },\n      { key:'compare', label:'Compare cohorts' },\n    ].map(n => ({ label:n.label, onClick:this.setScreen(n.key), bg: screen === n.key ? '#2b2b2b' : 'transparent', fg: screen === n.key ? '#fbfaf7' : '#77756b' }));\n\n    const filterDefs = [ { k:'all', label:'All' }, { k:'completed', label:'Completed' }, { k:'pending', label:'Pending' } ];\n    const filterItems = filterDefs.map(f => ({ label:f.label, onClick:this.setFilter(f.k), bg: this.state.listFilter === f.k ? '#2b2b2b' : 'transparent', fg: this.state.listFilter === f.k ? '#fbfaf7' : '#77756b' }));\n\n    // roster rows\n    const lf = this.state.listFilter;\n    const filtered = this.roster.filter(r => {\n      if(lf === 'completed') return r.status === 'Completed';\n      if(lf === 'pending') return r.status !== 'Completed';\n      return true;\n    });\n    const founders = filtered.map(r => {\n      const sm = this.statusMeta(r.status);\n      const hasTier = !!r.tier;\n      const tm = hasTier ? this.tierMeta(r.tier) : { fg:'', bg:'' };\n      return {\n        founder:r.founder, company:r.company, sector:r.sector,\n        statusLabel:sm.label, statusColor:sm.color, statusDotBg:sm.dotBg, statusDotBorder:sm.dotBorder,\n        hasTier, noTier:!hasTier, tier:r.tier || '', tierFg:tm.fg, tierBg:tm.bg,\n        onClick:this.selectFounder(r.id),\n      };\n    });\n    const listCountLabel = lf === 'all'\n      ? cur.size + ' founders · ' + cur.completed + ' completed, ' + pending + ' pending'\n      : 'Showing ' + filtered.length + ' of ' + cur.size + ' founders';\n\n    // comparison bars\n    const completionBars = this.cohorts.map(c => {\n      const p = Math.round(c.completed / c.size * 100);\n      return { short:c.short, valueLabel:p + '%', h:this.compScaleH(p) + 'px', bg: c.current ? accent : '#cdcabf', valColor: c.current ? '#2b2b2b' : '#9a988f' };\n    });\n    const maxIntensity = 180;\n    const intensityBars = this.cohorts.map(c => ({\n      short:c.short, valueLabel:String(c.intensity),\n      h: Math.round(c.intensity / maxIntensity * 150) + 'px',\n      bg: c.current ? accent : '#cdcabf', valColor: c.current ? '#2b2b2b' : '#9a988f',\n    }));\n    const confidenceBars = this.cohorts.map(c => ({\n      short:c.short,\n      strongH: (c.strong / c.completed * 150).toFixed(1) + 'px',\n      modH: (c.moderate / c.completed * 150).toFixed(1) + 'px',\n      emergH: (c.emerging / c.completed * 150).toFixed(1) + 'px',\n    }));\n\n    // founder detail\n    const rosterById = {};\n    this.roster.forEach(r => { rosterById[r.id] = r; });\n    let detail = null, detailCompleted = false, detailPending = false;\n    if(this.state.detailId){\n      const r = rosterById[this.state.detailId];\n      const d = r ? this.detailData[this.state.detailId] : null;\n      if(r && d){\n        detailCompleted = true;\n        const tm = this.tierMeta(r.tier);\n        const fpDot = this.confidenceDot(d.footprintConfidence);\n        const hpDot = this.confidenceDot(d.handprintConfidence);\n        const ratio = d.handprint / d.footprint;\n        let netText, netColor;\n        if(ratio >= 1){ netText = 'Handprint outweighs footprint ' + this.trimX(ratio) + '× — net-positive climate impact'; netColor = '#5a6a3e'; }\n        else { const inv = d.footprint / d.handprint; netText = 'Footprint outweighs handprint ' + this.trimX(inv) + '× — operational emissions exceed avoided'; netColor = '#8a6410'; }\n        const netTotal = d.footprint + d.handprint;\n        detail = {\n          company:r.company, founder:r.founder, sector:r.sector, tier:r.tier, tierFg:tm.fg, tierBg:tm.bg,\n          arr:'$' + d.revenueM + 'M', fte:d.fte,\n          intensityDisplay: d.revInt + ' tCO₂e/$M', exposureDisplay: this.formatK(d.costMidK) + '/yr',\n          footprintDisplay: d.footprint.toLocaleString(), footprintConfidence:d.footprintConfidence, footprintDotBg:fpDot.bg, footprintDotBorder:fpDot.border,\n          handprintDisplay: d.handprint.toLocaleString(), handprintConfidence:d.handprintConfidence, handprintDotBg:hpDot.bg, handprintDotBorder:hpDot.border,\n          footprintPct: Math.round(d.footprint / netTotal * 100), handprintPct: Math.round(d.handprint / netTotal * 100), netText, netColor,\n          sources: d.sources.map(s => ({ label:s.label, pct:s.pct, tco2eDisplay:s.tco2e.toLocaleString() })),\n          costBreakdown: d.costBreakdown.map(b => { const dd = this.confidenceDot(b.confidence); return { label:b.label, confidence:b.confidence, amountDisplay:this.formatK(b.amountK), dotBg:dd.bg, dotBorder:dd.border }; }),\n          costTotalDisplay: this.formatK(d.costMidK), costRangeDisplay: this.formatK(d.costLowK) + ' – ' + this.formatK(d.costHighK),\n          percentile:d.percentile, percentileLabel:this.percentileLabel(d.percentile), percentileColor:this.percentileColor(d.percentile), cohortN:this.cohortN[r.sector] || 50,\n        };\n      } else if(r){\n        detailPending = true;\n        const sm = this.statusMeta(r.status);\n        const first = r.founder.split(' ')[0];\n        const msg = r.status === 'In progress'\n          ? first + ' has started the climate assessment but hasn\\'t finished onboarding yet. Their footprint, hotspots, and peer ranking will appear here the moment they complete it.'\n          : first + ' hasn\\'t started the climate assessment yet. A gentle nudge often helps — completed assessments are what power this cohort\\'s numbers.';\n        detail = { company:r.company, founder:r.founder, sector:r.sector, statusLabel:sm.label, statusColor:sm.color, statusDotBg:sm.dotBg, statusDotBorder:sm.dotBorder, pendingMsg:msg };\n      }\n    }\n\n    return {\n      isOverview: screen === 'overview' && !this.state.detailId,\n      isCompare: screen === 'compare',\n      isDetail: screen === 'overview' && !!this.state.detailId,\n      detailCompleted, detailPending, detail,\n      goBackToList: this.goBackToList, sendReminder: this.sendReminder, reminderSent: this.state.reminderSent,\n      navItems,\n      cohortSize: cur.size,\n      completedN: cur.completed,\n      completionPct,\n      completionRingEl,\n      completionDeltaPts,\n      baselineName: base.name,\n      completionHint,\n      celebrate, celebrateStyle,\n      avgIntensity: cur.intensity,\n      intensityDeltaPct,\n      deltaChipStyle,\n      mixStrongW, mixModW, mixEmergW,\n      mixStrong: cur.strong, mixModerate: cur.moderate, mixEmerging: cur.emerging,\n      filterItems, listCountLabel, founders,\n      completionBars, intensityBars, confidenceBars,\n      strongSharePct, strongShareBasePct,\n      openExport: this.openExport, closeExport: this.closeExport, onDownload: this.onDownload,\n      exportOpen: this.state.exportOpen, exportSaved: this.state.exportSaved,\n      downloadBtnStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
